fullnameOverride: ""

env:
  - name: HF_TOKEN
    valueFrom:
      secretKeyRef:
        name: hf-secret
        key: HF_TOKEN
        optional: false

args:
  - --model_id=Qwen/Qwen3.5-9B
  - --model_name=qwen-3.5-9b
  - --max_model_len=8192

annotations: {}

labels: {}

resources:
  limits:
    cpu: "4"
    memory: 8Gi
    nvidia.com/gpu: "1"
  requests:
    cpu: "2"
    memory: 6Gi
    nvidia.com/gpu: "1"

metrics:
  enabled: false
  endpoints: []
    # - port: http-usermetric
    #   path: /metrics
