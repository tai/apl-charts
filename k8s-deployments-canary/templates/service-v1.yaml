apiVersion: v1
kind: Service
metadata:
  name: {{ include "deployment.fullname" . }}-v1
  labels:
    {{- include "deployment.labels" . | nindent 4 }}
    {{- with .Values.commonLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  type: ClusterIP
  ports: {{- .Values.servicePorts | toYaml | nindent 4 }} 
  selector:
    {{- include "deployment.selectorLabels" . | nindent 4 }}
    version: v1
